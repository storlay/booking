.prepare-prod-env:
  before_script:
    - cp "$PROD_ENV" .env

.prepare-test-env:
  before_script:
    - cp "$TEST_ENV" .env-test


stages:
  - build
  - lint_format
  - migrations
  - test
  - deploy

build-job:
  stage: build
  script:
    - docker build -t booking-api-image .
    - docker build -t booking-nginx-image ./nginx

lint-job:
  stage: lint_format
  script:
    - docker run --rm booking-api-image uv run ruff check

format-job:
  stage: lint_format
  script:
    - docker run --rm booking-api-image uv run ruff format --check

migrations-job:
  stage: migrations
  extends: .prepare-prod-env
  script:
    - docker-compose -f infra/docker-compose.prod.yml run --rm api uv run alembic upgrade head

test-job:
  stage: test
  extends: .prepare-test-env
  script:
    - docker-compose -f infra/docker-compose.ci-test.yml up --build --abort-on-container-exit
  after_script:
    - docker-compose -f infra/docker-compose.ci-test.yml down -v --remove-orphans

deploy-job:
  stage: deploy
  extends: .prepare-prod-env
  script:
    - docker compose -f ./infra/docker-compose.prod.yml up -d